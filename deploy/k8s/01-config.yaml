apiVersion: v1
kind: ConfigMap
metadata:
  name: opencontest-config
  namespace: opencontest
data:
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173"
  POSTGRES_DB: "opencontest"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  JUDGE_QUEUE: "judge.submissions"
  BACKEND_API_URL: "http://backend:8000/api"
  RUNNER_CALLBACK_TOKEN: "change-me-runner-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: opencontest-secrets
  namespace: opencontest
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "change-me-before-production"
  POSTGRES_USER: "opencontest"
  POSTGRES_PASSWORD: "opencontest"
