apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: opencontest
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: opencontest-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate"]
          envFrom:
            - configMapRef:
                name: opencontest-config
            - secretRef:
                name: opencontest-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: opencontest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: opencontest-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: opencontest-config
            - secretRef:
                name: opencontest-secrets
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: opencontest
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backend-requeue-pending
  namespace: opencontest
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: requeue
              image: opencontest-backend:latest
              imagePullPolicy: IfNotPresent
              command:
                - python
                - manage.py
                - requeue_pending
                - --stale-minutes
                - "2"
                - --running-stale-minutes
                - "10"
              envFrom:
                - configMapRef:
                    name: opencontest-config
                - secretRef:
                    name: opencontest-secrets
